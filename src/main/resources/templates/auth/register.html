<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Create Account — Elevate Luxe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-body">
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-brand"><a th:href="@{/}">✦ Elevate Luxe</a></div>
        <h2 class="auth-title">Join the Club</h2>
        <p class="auth-subtitle">Create your Elevate Luxe account</p>

        <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

        <form th:action="@{/auth/register}" method="post" th:object="${registerDto}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="row g-3">
                <div class="col-6">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-control luxury-input" th:field="*{firstName}" placeholder="Sophie" required/>
                    <div class="form-error" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                </div>
                <div class="col-6">
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-control luxury-input" th:field="*{lastName}" placeholder="Laurent" required/>
                    <div class="form-error" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                </div>
                <div class="col-12">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control luxury-input" th:field="*{email}" placeholder="your@email.com" required/>
                    <div class="form-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>
                <div class="col-12">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control luxury-input" th:field="*{password}" placeholder="Min. 6 characters" required/>
                    <div class="form-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>
                <div class="col-12">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-control luxury-input" th:field="*{confirmPassword}" placeholder="Repeat password" required/>
                    <div class="form-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                </div>
            </div>
            <button type="submit" class="btn btn-luxury w-100 btn-lg mt-4">Create Account</button>
        </form>

        <div class="auth-divider"><span>or</span></div>
        <p class="text-center auth-switch">
            Already a member? <a th:href="@{/auth/login}">Sign In</a>
        </p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
