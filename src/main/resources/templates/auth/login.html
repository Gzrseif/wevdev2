<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In — Elevate Luxe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-body">
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-brand"><a th:href="@{/}">✦ Elevate Luxe</a></div>
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Sign in to your account</p>

        <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>
        <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
        <div th:if="${logoutMsg}" class="alert alert-info" th:text="${logoutMsg}"></div>

        <form th:action="@{/auth/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control luxury-input" name="email" placeholder="your@email.com" required autofocus/>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" class="form-control luxury-input" name="password" placeholder="••••••••" required/>
            </div>
            <button type="submit" class="btn btn-luxury w-100 btn-lg">Sign In</button>
        </form>

        <div class="auth-divider"><span>or</span></div>
        <p class="text-center auth-switch">
            New here? <a th:href="@{/auth/register}">Create an account</a>
        </p>

        <div class="demo-credentials mt-4">
            <p class="demo-label">Demo Credentials:</p>
            <div class="demo-row"><span>Admin:</span><code>admin@elevateluxe.com / admin123</code></div>
            <div class="demo-row"><span>User:</span><code>sophie@example.com / user123</code></div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
