<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${product.name} + ' — Elevate Luxe'">Product — Elevate Luxe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container section-padding">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb luxury-breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
            <li class="breadcrumb-item"><a th:href="@{/shop}">Shop</a></li>
            <li class="breadcrumb-item" th:if="${product.category != null}">
                <a th:href="@{/shop(category=${product.category.id})}" th:text="${product.category.name}">Category</a>
            </li>
            <li class="breadcrumb-item active" th:text="${product.name}">Product</li>
        </ol>
    </nav>

    <div class="row g-5">
        <!-- Product Image -->
        <div class="col-lg-6">
            <div class="product-detail-img-wrap">
                <img th:src="${product.imageUrl != null ? product.imageUrl : '/images/placeholder.jpg'}"
                     th:alt="${product.name}" class="product-detail-img"/>
                <div class="product-detail-badge" th:if="${!product.inStock}">Sold Out</div>
            </div>
        </div>

        <!-- Product Info -->
        <div class="col-lg-6">
            <div class="product-detail-info">
                <div class="product-detail-category" th:text="${product.category?.name}">Category</div>
                <div class="product-detail-brand" th:text="${product.brand}">Brand</div>
                <h1 class="product-detail-title" th:text="${product.name}">Product Name</h1>
                <div class="product-detail-price">€<span th:text="${#numbers.formatDecimal(product.price, 1, 2)}">0.00</span></div>

                <div class="product-detail-desc" th:text="${product.description}">Description</div>

                <div class="product-detail-meta">
                    <div class="meta-item">
                        <i class="fas fa-warehouse"></i>
                        <span th:if="${product.inStock}" th:text="'In Stock (' + ${product.stockQuantity} + ' available)'">In Stock</span>
                        <span th:unless="${product.inStock}" class="text-danger">Out of Stock</span>
                    </div>
                    <div class="meta-item">
                        <i class="fas fa-truck"></i>
                        <span>Free shipping on orders over €80</span>
                    </div>
                </div>

                <!-- Add to Cart -->
                <form th:action="@{/cart/add}" method="post" class="product-detail-form" th:if="${product.inStock}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="productId" th:value="${product.id}"/>
                    <div class="qty-selector">
                        <label>Quantity</label>
                        <div class="qty-controls">
                            <button type="button" class="qty-btn" onclick="changeQty(-1)">−</button>
                            <input type="number" name="quantity" id="qtyInput" value="1" min="1"
                                   th:max="${product.stockQuantity}" class="qty-input"/>
                            <button type="button" class="qty-btn" onclick="changeQty(1)">+</button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-luxury btn-lg w-100 mt-3">
                        <i class="fas fa-shopping-bag me-2"></i> Add to Bag
                    </button>
                </form>
                <div th:unless="${product.inStock}" class="out-of-stock-note">
                    <i class="fas fa-bell me-2"></i> This item is currently unavailable.
                </div>

                <div class="product-guarantees mt-4">
                    <div class="guarantee-item"><i class="fas fa-lock"></i><span>Secure Checkout</span></div>
                    <div class="guarantee-item"><i class="fas fa-undo"></i><span>30-Day Returns</span></div>
                    <div class="guarantee-item"><i class="fas fa-star"></i><span>Premium Quality</span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Related Products -->
    <div class="mt-6" th:if="${related != null and !related.isEmpty()}">
        <div class="section-header mb-4">
            <div class="section-eyebrow">You may also like</div>
            <h3 class="section-title-sm">Related Products</h3>
        </div>
        <div class="row g-4">
            <div class="col-6 col-lg-3" th:each="rel : ${related}">
                <div class="product-card">
                    <div class="product-img-wrap">
                        <a th:href="@{/product/{id}(id=${rel.id})}">
                            <img th:src="${rel.imageUrl != null ? rel.imageUrl : '/images/placeholder.jpg'}"
                                 th:alt="${rel.name}" class="product-img" loading="lazy"/>
                        </a>
                    </div>
                    <div class="product-info">
                        <div class="product-brand" th:text="${rel.brand}">Brand</div>
                        <a th:href="@{/product/{id}(id=${rel.id})}" class="product-name" th:text="${rel.name}">Product</a>
                        <div class="product-price">€<span th:text="${#numbers.formatDecimal(rel.price, 1, 2)}">0.00</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function changeQty(delta) {
    const input = document.getElementById('qtyInput');
    const newVal = Math.max(1, Math.min(parseInt(input.max), parseInt(input.value) + delta));
    input.value = newVal;
}
</script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
