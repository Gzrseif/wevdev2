<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Shop — Elevate Luxe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="page-hero-sm">
    <div class="container">
        <h1 class="page-hero-title" th:text="${pageTitle != null ? pageTitle : 'Shop'}">Shop</h1>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb luxury-breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
                <li class="breadcrumb-item active" th:text="${pageTitle != null ? pageTitle : 'Shop'}">Shop</li>
            </ol>
        </nav>
    </div>
</div>

<div class="container section-padding">
    <div class="row">
        <div class="col-lg-3 mb-4">
            <div class="shop-sidebar">
                <h6 class="sidebar-title">Collections</h6>
                <ul class="sidebar-cats">
                    <li><a th:href="@{/shop}" th:classappend="${activeCategory == null} ? 'active' : ''">All Products</a></li>
                    <li th:each="cat : ${categories}">
                        <a th:href="@{/shop(category=${cat.id})}"
                           th:classappend="${activeCategory != null and activeCategory.id == cat.id} ? 'active' : ''"
                           th:text="${cat.name}">Category</a>
                    </li>
                </ul>
            </div>
        </div>

        <div class="col-lg-9">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <span class="products-count" th:text="${products != null ? products.size() + ' products' : '0 products'}">0 products</span>
                <div th:if="${searchQuery != null}" class="search-indicator">
                    Showing results for "<strong th:text="${searchQuery}">query</strong>"
                    <a th:href="@{/shop}" class="ms-2 text-muted"><i class="fas fa-times"></i></a>
                </div>
            </div>

            <div th:if="${products == null or products.isEmpty()}" class="empty-state">
                <i class="fas fa-search fa-3x mb-3"></i>
                <h4>No products found</h4>
                <p>Try a different search or browse our collections.</p>
                <a th:href="@{/shop}" class="btn btn-luxury mt-3">Browse All</a>
            </div>

            <div class="row g-4" th:unless="${products == null or products.isEmpty()}">
                <div class="col-6 col-lg-4" th:each="product : ${products}">
                    <div class="product-card">
                        <div class="product-img-wrap">
                            <a th:href="@{/product/{id}(id=${product.id})}">
                                <img th:src="${product.imageUrl != null ? product.imageUrl : '/images/placeholder.jpg'}"
                                     th:alt="${product.name}" class="product-img" loading="lazy"/>
                            </a>
                            <div class="product-badges">
                                <span class="badge-featured" th:if="${product.featured}">Featured</span>
                                <span class="badge-outofstock" th:unless="${product.inStock}">Sold Out</span>
                            </div>
                            <div class="product-actions">
                                <form th:action="@{/cart/add}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <input type="hidden" name="productId" th:value="${product.id}"/>
                                    <input type="hidden" name="quantity" value="1"/>
                                    <button type="submit" class="btn-add-cart" th:disabled="${!product.inStock}">
                                        <i class="fas fa-shopping-bag me-1"></i>
                                        <span th:text="${product.inStock ? 'Add to Bag' : 'Sold Out'}">Add to Bag</span>
                                    </button>
                                </form>
                            </div>
                        </div>
                        <div class="product-info">
                            <div class="product-brand" th:text="${product.brand}">Brand</div>
                            <a th:href="@{/product/{id}(id=${product.id})}" class="product-name" th:text="${product.name}">Product</a>
                            <div class="d-flex justify-content-between align-items-center">
                                <div class="product-price">&#8364;<span th:text="${#numbers.formatDecimal(product.price, 1, 2)}">0.00</span></div>
                                <small th:if="${product.stockQuantity <= 5 and product.inStock}" class="text-warning" th:text="${product.stockQuantity + ' left'}">Low stock</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
