<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Shopping Bag — Elevate Luxe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="page-hero-sm">
    <div class="container">
        <h1 class="page-hero-title">Your Bag</h1>
    </div>
</div>

<div class="container section-padding">
    <div th:if="${cartMsg}" class="alert alert-luxury mb-4" th:text="${cartMsg}"></div>

    <div th:if="${cartItems == null or cartItems.isEmpty()}" class="empty-cart text-center py-5">
        <i class="fas fa-shopping-bag fa-4x mb-4"></i>
        <h3>Your bag is empty</h3>
        <p class="text-muted">Discover our curated collection of luxury essentials.</p>
        <a th:href="@{/shop}" class="btn btn-luxury mt-3">Continue Shopping</a>
    </div>

    <div th:unless="${cartItems == null or cartItems.isEmpty()}">
        <div class="row g-4">
            <!-- Cart Items -->
            <div class="col-lg-8">
                <div class="cart-items">
                    <div class="cart-item" th:each="item : ${cartItems}">
                        <div class="cart-item-img">
                            <img th:src="${item.imageUrl != null ? item.imageUrl : '/images/placeholder.jpg'}"
                                 th:alt="${item.productName}"/>
                        </div>
                        <div class="cart-item-info">
                            <div class="cart-item-name" th:text="${item.productName}">Product</div>
                            <div class="cart-item-price">€<span th:text="${#numbers.formatDecimal(item.unitPrice, 1, 2)}">0.00</span></div>
                        </div>
                        <div class="cart-item-controls">
                            <form th:action="@{/cart/update}" method="post" class="d-inline-flex align-items-center gap-2">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <input type="hidden" name="productId" th:value="${item.productId}"/>
                                <div class="qty-controls-sm">
                                    <button type="submit" name="quantity" th:value="${item.quantity - 1}" class="qty-btn-sm">−</button>
                                    <span class="qty-display" th:text="${item.quantity}">1</span>
                                    <button type="submit" name="quantity" th:value="${item.quantity + 1}" class="qty-btn-sm">+</button>
                                </div>
                            </form>
                        </div>
                        <div class="cart-item-subtotal">
                            €<span th:text="${#numbers.formatDecimal(item.subtotal, 1, 2)}">0.00</span>
                        </div>
                        <div class="cart-item-remove">
                            <form th:action="@{/cart/remove}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <input type="hidden" name="productId" th:value="${item.productId}"/>
                                <button type="submit" class="btn-remove"><i class="fas fa-times"></i></button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="mt-3 d-flex justify-content-between">
                    <a th:href="@{/shop}" class="btn btn-luxury-outline"><i class="fas fa-arrow-left me-2"></i>Continue Shopping</a>
                    <form th:action="@{/cart/clear}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button class="btn btn-sm btn-outline-secondary">Clear Bag</button>
                    </form>
                </div>
            </div>
            <!-- Order Summary -->
            <div class="col-lg-4">
                <div class="order-summary-card">
                    <h5 class="summary-title">Order Summary</h5>
                    <div class="summary-line">
                        <span>Subtotal</span>
                        <span>€<span th:text="${#numbers.formatDecimal(cartTotal, 1, 2)}">0.00</span></span>
                    </div>
                    <div class="summary-line">
                        <span>Shipping</span>
                        <span th:text="${cartTotal.doubleValue() >= 80 ? 'Free' : '€5.99'}">€5.99</span>
                    </div>
                    <div class="summary-divider"></div>
                    <div class="summary-total">
                        <span>Total</span>
                        <span>€<span th:text="${#numbers.formatDecimal(cartTotal, 1, 2)}">0.00</span></span>
                    </div>
                    <a th:href="@{/checkout}" class="btn btn-luxury btn-lg w-100 mt-3">
                        <i class="fas fa-lock me-2"></i>Proceed to Checkout
                    </a>
                    <div class="security-note mt-3 text-center">
                        <i class="fas fa-shield-alt me-1"></i> Secure, encrypted checkout
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
