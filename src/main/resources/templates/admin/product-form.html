<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${productDto.id != null ? 'Edit Product' : 'New Product'} + ' — Admin — Elevate Luxe'">Product Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body class="admin-body">
<div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
<div class="admin-main">
    <div th:replace="~{fragments/admin-sidebar :: topbar(${productDto.id != null ? 'Edit Product' : 'New Product'})}"></div>
    <div class="admin-content">
        <div class="admin-card" style="max-width: 800px;">
            <div class="admin-card-header">
                <h5 th:text="${productDto.id != null ? 'Edit Product' : 'Add New Product'}">Product Form</h5>
                <a th:href="@{/admin/products}" class="btn btn-sm btn-luxury-outline">
                    <i class="fas fa-arrow-left me-1"></i> Back
                </a>
            </div>

            <form th:action="@{/admin/products/save}" method="post" enctype="multipart/form-data" th:object="${productDto}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" th:field="*{id}"/>
                <input type="hidden" th:field="*{imageUrl}"/>

                <div class="row g-4">
                    <!-- Image Upload -->
                    <div class="col-12">
                        <label class="form-label">Product Image</label>
                        <div class="image-upload-zone" id="uploadZone">
                            <img id="imagePreview"
                                 th:src="${productDto.imageUrl != null ? productDto.imageUrl : '/images/placeholder.jpg'}"
                                 class="upload-preview" alt="Preview"/>
                            <div class="upload-overlay">
                                <i class="fas fa-cloud-upload-alt fa-2x mb-2"></i>
                                <div>Click or drag to upload image</div>
                                <div class="text-muted small">JPG, PNG, WebP — max 10MB</div>
                            </div>
                            <input type="file" name="imageFile" id="imageFile" accept="image/*" class="upload-input"
                                   onchange="previewImage(event)"/>
                        </div>
                    </div>

                    <div class="col-md-8">
                        <label class="form-label">Product Name *</label>
                        <input type="text" class="form-control luxury-input" th:field="*{name}" placeholder="e.g. Maison Noir Eau de Parfum" required/>
                        <div class="form-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Brand</label>
                        <input type="text" class="form-control luxury-input" th:field="*{brand}" placeholder="e.g. Maison Noir"/>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Description *</label>
                        <textarea class="form-control luxury-input" th:field="*{description}" rows="4"
                                  placeholder="Detailed product description..." required></textarea>
                        <div class="form-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Price (€) *</label>
                        <input type="number" class="form-control luxury-input" th:field="*{price}"
                               step="0.01" min="0.01" placeholder="0.00" required/>
                        <div class="form-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Stock Quantity *</label>
                        <input type="number" class="form-control luxury-input" th:field="*{stockQuantity}"
                               min="0" placeholder="0" required/>
                        <div class="form-error" th:if="${#fields.hasErrors('stockQuantity')}" th:errors="*{stockQuantity}"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Category</label>
                        <select class="form-select luxury-input" th:field="*{categoryId}">
                            <option value="">— Select Category —</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">Category</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <div class="form-check luxury-check">
                            <input class="form-check-input" type="checkbox" th:field="*{featured}" id="featuredCheck"/>
                            <label class="form-check-label" for="featuredCheck">
                                <i class="fas fa-star me-1" style="color:var(--gold)"></i> Featured Product
                            </label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-check luxury-check">
                            <input class="form-check-input" type="checkbox" th:field="*{active}" id="activeCheck"/>
                            <label class="form-check-label" for="activeCheck">
                                <i class="fas fa-eye me-1"></i> Active (visible in store)
                            </label>
                        </div>
                    </div>

                    <div class="col-12 mt-2">
                        <button type="submit" class="btn btn-luxury btn-lg me-2">
                            <i class="fas fa-save me-2"></i>
                            <span th:text="${productDto.id != null ? 'Save Changes' : 'Create Product'}">Save</span>
                        </button>
                        <a th:href="@{/admin/products}" class="btn btn-luxury-outline btn-lg">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('imagePreview').src = e.target.result;
    };
    reader.readAsDataURL(event.target.files[0]);
}
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) { document.getElementById('imageFile').files = e.dataTransfer.files; previewImage({target: {files: [file]}}); }
});
</script>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
