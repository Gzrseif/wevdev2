<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Users — Admin — Elevate Luxe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body class="admin-body">
<div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
<div class="admin-main">
    <div th:replace="~{fragments/admin-sidebar :: topbar('Users')}"></div>
    <div class="admin-content">
        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" th:text="${successMsg}">
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="admin-card">
            <div class="admin-card-header">
                <h5>All Users (<span th:text="${users != null ? users.size() : 0}">0</span>)</h5>
            </div>
            <div class="mb-3">
                <input type="text" class="form-control luxury-input" placeholder="Search users…"
                       oninput="document.querySelectorAll('#usersTable tbody tr').forEach(r => r.style.display = r.textContent.toLowerCase().includes(this.value.toLowerCase()) ? '' : 'none')"/>
            </div>
            <div class="table-responsive">
                <table class="table luxury-table" id="usersTable">
                    <thead>
                    <tr><th>Name</th><th>Email</th><th>Roles</th><th>Joined</th><th>Status</th><th>Actions</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="u : ${users}">
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="user-mini-avatar" th:text="${u.firstName.charAt(0)}">A</div>
                                <span th:text="${u.fullName}">User Name</span>
                            </div>
                        </td>
                        <td th:text="${u.email}">email</td>
                        <td>
                            <span th:each="r : ${u.roles}" class="badge-role me-1"
                                  th:text="${r.name.replace('ROLE_','')}">USER</span>
                        </td>
                        <td th:text="${#temporals.format(u.createdAt, 'dd MMM yyyy')}">01 Jan 2025</td>
                        <td>
                            <span th:if="${u.enabled}" class="badge bg-success">Active</span>
                            <span th:unless="${u.enabled}" class="badge bg-danger">Disabled</span>
                        </td>
                        <td>
                            <div class="d-flex gap-2">
                                <form th:action="@{/admin/users/{id}/toggle(id=${u.id})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button class="btn btn-sm btn-luxury-outline"
                                            th:text="${u.enabled ? 'Disable' : 'Enable'}"
                                            th:title="${u.enabled ? 'Disable user' : 'Enable user'}">Toggle</button>
                                </form>
                                <form th:action="@{/admin/users/{id}/promote(id=${u.id})}" method="post"
                                <!--Thymeleaf's strings utility instead of a lambda -->
                                      th:unless="${#strings.contains(u.roles.toString(), 'ROLE_ADMIN')}">

                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button class="btn btn-sm btn-outline-warning" title="Promote to Admin">
                                        <i class="fas fa-crown"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${users == null or users.isEmpty()}">
                        <td colspan="6" class="text-center text-muted py-3">No users found</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
