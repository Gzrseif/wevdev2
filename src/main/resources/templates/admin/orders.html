<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Orders — Admin — Elevate Luxe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body class="admin-body">
<div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
<div class="admin-main">
    <div th:replace="~{fragments/admin-sidebar :: topbar('Orders')}"></div>
    <div class="admin-content">
        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" th:text="${successMsg}">
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="admin-card">
            <div class="admin-card-header">
                <h5>All Orders (<span th:text="${orders != null ? orders.size() : 0}">0</span>)</h5>
            </div>
            <div class="mb-3">
                <input type="text" class="form-control luxury-input" placeholder="Search orders…" oninput="filterOrderTable(this.value)"/>
            </div>
            <div class="table-responsive">
                <table class="table luxury-table" id="ordersTable">
                    <thead>
                        <tr><th>Order #</th><th>Customer</th><th>Date</th><th>Items</th><th>Status</th><th>Total</th><th></th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}">
                            <td class="fw-medium" th:text="${order.orderNumber}">EL-001</td>
                            <td>
                                <div th:text="${order.user.fullName}">Customer</div>
                                <small class="text-muted" th:text="${order.user.email}">email</small>
                            </td>
                            <td th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy')}">01 Jan 2025</td>
                            <td th:text="${order.items.size() + ' item(s)'}">1 item(s)</td>
                            <td><span class="status-badge" th:classappend="${'status-' + order.status.name().toLowerCase()}" th:text="${order.status}">PENDING</span></td>
                            <td>€<span th:text="${#numbers.formatDecimal(order.totalAmount,1,2)}">0.00</span></td>
                            <td><a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn btn-sm btn-luxury-outline">View</a></td>
                        </tr>
                        <tr th:if="${orders == null or orders.isEmpty()}">
                            <td colspan="7" class="text-center text-muted py-3">No orders yet</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function filterOrderTable(q) {
    q = q.toLowerCase();
    document.querySelectorAll('#ordersTable tbody tr').forEach(r => {
        r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
}
</script>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
