<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Order Detail — Admin — Elevate Luxe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body class="admin-body">
<div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
<div class="admin-main">
    <div th:replace="~{fragments/admin-sidebar :: topbar('Order Detail')}"></div>
    <div class="admin-content">
        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" th:text="${successMsg}">
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="mb-0">Order <span th:text="${order.orderNumber}">EL-001</span></h5>
            <a th:href="@{/admin/orders}" class="btn btn-sm btn-luxury-outline"><i class="fas fa-arrow-left me-1"></i>Back</a>
        </div>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="admin-card mb-4">
                    <h6 class="admin-card-section-title">Items</h6>
                    <div class="order-detail-item" th:each="item : ${order.items}">
                        <img th:src="${item.product.imageUrl != null ? item.product.imageUrl : '/images/placeholder.jpg'}"
                             th:alt="${item.product.name}" class="order-detail-img"/>
                        <div class="order-detail-item-info flex-grow-1">
                            <div class="fw-medium" th:text="${item.product.name}">Product</div>
                            <div class="text-muted small" th:text="${item.product.brand}">Brand</div>
                            <div class="small">Qty: <span th:text="${item.quantity}">1</span></div>
                        </div>
                        <div class="text-end">
                            <div>€<span th:text="${#numbers.formatDecimal(item.unitPrice,1,2)}">0.00</span> each</div>
                            <div class="fw-bold">€<span th:text="${#numbers.formatDecimal(item.subtotal,1,2)}">0.00</span></div>
                        </div>
                    </div>
                    <div class="text-end mt-3 pt-3 border-top fw-bold fs-5">
                        Total: €<span th:text="${#numbers.formatDecimal(order.totalAmount,1,2)}">0.00</span>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <!-- Update Status -->
                <div class="admin-card mb-4">
                    <h6 class="admin-card-section-title">Update Status</h6>
                    <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <select class="form-select luxury-input mb-3" name="status">
                            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                                    th:selected="${s == order.status}">STATUS</option>
                        </select>
                        <button type="submit" class="btn btn-luxury w-100">Update Status</button>
                    </form>
                </div>

                <!-- Customer Info -->
                <div class="admin-card mb-4">
                    <h6 class="admin-card-section-title">Customer</h6>
                    <div class="mb-1 fw-medium" th:text="${order.user.fullName}">Customer</div>
                    <div class="text-muted small" th:text="${order.user.email}">email</div>
                    <div class="text-muted small" th:text="${order.user.phone}">phone</div>
                </div>

                <!-- Shipping -->
                <div class="admin-card">
                    <h6 class="admin-card-section-title">Shipping Address</h6>
                    <div class="text-muted small">
                        <div th:text="${order.shippingAddress}">Street</div>
                        <div th:text="${order.shippingCity + ' ' + order.shippingPostalCode}">City</div>
                        <div th:text="${order.shippingCountry}">Country</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
