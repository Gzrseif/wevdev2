<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Orders — Elevate Luxe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="page-hero-sm">
    <div class="container">
        <h1 class="page-hero-title">My Orders</h1>
    </div>
</div>

<div class="container section-padding">
    <div th:if="${orders == null or orders.isEmpty()}" class="empty-state text-center py-5">
        <i class="fas fa-box-open fa-3x mb-3"></i>
        <h4>No orders yet</h4>
        <p class="text-muted">Your purchase history will appear here.</p>
        <a th:href="@{/shop}" class="btn btn-luxury mt-3">Start Shopping</a>
    </div>

    <div th:unless="${orders == null or orders.isEmpty()}" class="orders-list">
        <div class="order-card mb-4" th:each="order : ${orders}">
            <div class="order-card-header">
                <div class="order-info">
                    <span class="order-number" th:text="${order.orderNumber}">EL-001</span>
                    <span class="order-date" th:text="${#temporals.format(order.createdAt, 'dd MMMM yyyy')}">01 Jan 2025</span>
                </div>
                <div class="order-meta">
                    <span class="status-badge" th:classappend="${'status-' + order.status.name().toLowerCase()}" th:text="${order.status}">PENDING</span>
                    <span class="order-total ms-3">€<span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)}">0.00</span></span>
                </div>
            </div>
            <div class="order-card-items">
                <div class="order-item-preview" th:each="item, iterStat : ${order.items}" th:if="${iterStat.index < 3}">
                    <img th:src="${item.product.imageUrl != null ? item.product.imageUrl : '/images/placeholder.jpg'}"
                         th:alt="${item.product.name}" class="order-item-img"/>
                    <div class="order-item-info">
                        <div th:text="${item.product.name}">Product</div>
                        <small>Qty: <span th:text="${item.quantity}">1</span> · €<span th:text="${#numbers.formatDecimal(item.unitPrice, 1, 2)}">0.00</span></small>
                    </div>
                </div>
                <div th:if="${order.items.size() > 3}" class="more-items">
                    +<span th:text="${order.items.size() - 3}">0</span> more items
                </div>
            </div>
            <div class="order-card-footer">
                <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-luxury-outline btn-sm">View Details</a>
                <div class="order-shipping" th:if="${order.shippingCity != null}">
                    <i class="fas fa-map-marker-alt me-1"></i>
                    <span th:text="${order.shippingCity + ', ' + order.shippingCountry}">City, Country</span>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
