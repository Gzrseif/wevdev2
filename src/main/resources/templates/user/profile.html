<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Profile — Elevate Luxe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="page-hero-sm">
    <div class="container">
        <h1 class="page-hero-title">My Profile</h1>
    </div>
</div>

<div class="container section-padding">
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show mb-4" th:text="${successMsg}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${pwError}" class="alert alert-danger alert-dismissible fade show mb-4" th:text="${pwError}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
        <!-- Profile Sidebar -->
        <div class="col-lg-3">
            <div class="profile-sidebar">
                <div class="profile-avatar-section text-center mb-4">
                    <div class="avatar-wrap">
                        <img th:if="${user.avatarUrl != null}"
                             th:src="${user.avatarUrl}" class="profile-avatar" alt="Avatar"/>
                        <div th:unless="${user.avatarUrl != null}" class="profile-avatar-placeholder">
                            <span th:text="${user.firstName.charAt(0)}">A</span>
                        </div>
                    </div>
                    <h5 class="mt-3 mb-0" th:text="${user.fullName}">User Name</h5>
                    <small class="text-muted" th:text="${user.email}">email</small>
                    <div class="mt-2">
                        <span class="badge-role" th:each="role : ${user.roles}" th:text="${role.name.replace('ROLE_', '')}">USER</span>
                    </div>
                    <!-- Avatar upload -->
                    <form th:action="@{/profile/avatar}" method="post" enctype="multipart/form-data" class="mt-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <label class="btn btn-sm btn-luxury-outline w-100">
                            <i class="fas fa-camera me-1"></i> Change Photo
                            <input type="file" name="avatar" accept="image/*" class="d-none" onchange="this.form.submit()"/>
                        </label>
                    </form>
                </div>
                <nav class="profile-nav">
                    <a href="#info" class="profile-nav-link active"><i class="fas fa-user me-2"></i>Personal Info</a>
                    <a href="#password" class="profile-nav-link"><i class="fas fa-lock me-2"></i>Change Password</a>
                    <a th:href="@{/orders}" class="profile-nav-link"><i class="fas fa-box me-2"></i>My Orders</a>
                    <a th:href="@{/admin}" class="profile-nav-link text-accent" sec:authorize="hasRole('ADMIN')"><i class="fas fa-crown me-2"></i>Admin Panel</a>
                </nav>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-lg-9">
            <!-- Personal Info -->
            <div class="profile-card mb-4" id="info">
                <h5 class="profile-card-title">Personal Information</h5>
                <form th:action="@{/profile/update}" method="post" th:object="${profileDto}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-control luxury-input" th:field="*{firstName}" required/>
                            <div class="form-error" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-control luxury-input" th:field="*{lastName}" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control luxury-input" th:value="${user.email}" disabled/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone</label>
                            <input type="tel" class="form-control luxury-input" th:field="*{phone}" placeholder="+40 700 000 000"/>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Address</label>
                            <input type="text" class="form-control luxury-input" th:field="*{address}" placeholder="Street address"/>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">City</label>
                            <input type="text" class="form-control luxury-input" th:field="*{city}" placeholder="City"/>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Postal Code</label>
                            <input type="text" class="form-control luxury-input" th:field="*{postalCode}" placeholder="00000"/>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Country</label>
                            <input type="text" class="form-control luxury-input" th:field="*{country}" placeholder="Country"/>
                        </div>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-luxury">Save Changes</button>
                    </div>
                </form>
            </div>

            <!-- Recent Orders -->
            <div class="profile-card mb-4" th:if="${recentOrders != null and !recentOrders.isEmpty()}">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="profile-card-title mb-0">Recent Orders</h5>
                    <a th:href="@{/orders}" class="btn btn-sm btn-luxury-outline">View All</a>
                </div>
                <div class="table-responsive">
                    <table class="table luxury-table">
                        <thead><tr><th>Order</th><th>Date</th><th>Status</th><th>Total</th><th></th></tr></thead>
                        <tbody>
                        <tr th:each="order : ${recentOrders}">
                            <td class="fw-medium" th:text="${order.orderNumber}">EL-001</td>
                            <td th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy')}">01 Jan 2025</td>
                            <td><span class="status-badge" th:classappend="${'status-' + order.status.name().toLowerCase()}" th:text="${order.status}">PENDING</span></td>
                            <td>€<span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)}">0.00</span></td>
                            <td><a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-sm btn-luxury-outline">View</a></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Change Password -->
            <div class="profile-card" id="password">
                <h5 class="profile-card-title">Change Password</h5>
                <form th:action="@{/profile/change-password}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label">Current Password</label>
                            <input type="password" class="form-control luxury-input" name="oldPassword" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">New Password</label>
                            <input type="password" class="form-control luxury-input" name="newPassword" minlength="6" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Confirm New Password</label>
                            <input type="password" class="form-control luxury-input" name="confirmPassword" required/>
                        </div>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-luxury">Update Password</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
