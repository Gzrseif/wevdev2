<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Order Details — Elevate Luxe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="page-hero-sm">
    <div class="container">
        <h1 class="page-hero-title">Order <span th:text="${order.orderNumber}">EL-001</span></h1>
    </div>
</div>

<div class="container section-padding">
    <div th:if="${successOrder}" class="alert alert-success mb-4">
        <i class="fas fa-check-circle me-2"></i> Order placed successfully! Reference: <strong th:text="${successOrder}">EL-001</strong>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="profile-card mb-4">
                <h5 class="profile-card-title">Order Items</h5>
                <div th:each="item : ${order.items}" class="order-detail-item">
                    <img th:src="${item.product.imageUrl != null ? item.product.imageUrl : '/images/placeholder.jpg'}"
                         th:alt="${item.product.name}" class="order-detail-img"/>
                    <div class="order-detail-item-info">
                        <div class="fw-medium" th:text="${item.product.name}">Product</div>
                        <div class="text-muted small" th:text="${item.product.brand}">Brand</div>
                        <div class="small">Qty: <span th:text="${item.quantity}">1</span></div>
                    </div>
                    <div class="order-detail-price">
                        €<span th:text="${#numbers.formatDecimal(item.unitPrice, 1, 2)}">0.00</span>
                        <div class="text-muted small">each</div>
                    </div>
                    <div class="order-detail-subtotal fw-medium">
                        €<span th:text="${#numbers.formatDecimal(item.subtotal, 1, 2)}">0.00</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="order-summary-card mb-4">
                <h5 class="summary-title">Order Summary</h5>
                <div class="summary-line">
                    <span>Order Number</span>
                    <span th:text="${order.orderNumber}">EL-001</span>
                </div>
                <div class="summary-line">
                    <span>Date</span>
                    <span th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy')}">01 Jan 2025</span>
                </div>
                <div class="summary-line">
                    <span>Status</span>
                    <span class="status-badge" th:classappend="${'status-' + order.status.name().toLowerCase()}" th:text="${order.status}">PENDING</span>
                </div>
                <div class="summary-divider"></div>
                <div class="summary-total">
                    <span>Total</span>
                    <span>€<span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)}">0.00</span></span>
                </div>
            </div>

            <div class="order-summary-card">
                <h5 class="summary-title">Shipping Address</h5>
                <div class="text-muted" th:if="${order.shippingAddress != null}">
                    <div th:text="${order.shippingAddress}">Street</div>
                    <div th:text="${order.shippingCity + ', ' + order.shippingPostalCode}">City</div>
                    <div th:text="${order.shippingCountry}">Country</div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <a th:href="@{/orders}" class="btn btn-luxury-outline"><i class="fas fa-arrow-left me-2"></i>Back to Orders</a>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
